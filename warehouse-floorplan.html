<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f5f6f8;
    color: #222;
  }
  .toolbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: #1a1d27; color: #fff; padding: 10px 24px;
    display: flex; align-items: center; gap: 16px; font-size: 13px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .toolbar h1 { font-size: 15px; font-weight: 700; }
  .toolbar h1 span { color: #6c8aff; }
  .toolbar .info { color: #a0a8c0; font-size: 11px; }
  .toolbar .btns { margin-left: auto; display: flex; gap: 6px; }
  .toolbar button {
    background: #2d3040; color: #e1e4ea; border: 1px solid #3d4260;
    padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 11px;
  }
  .toolbar button:hover { background: #3d4260; }

  .wrap {
    margin-top: 44px; overflow: auto; width: 100vw; height: calc(100vh - 44px);
    display: flex; justify-content: center; padding: 20px;
  }

  /* Tooltip */
  .tip {
    position: fixed; background: #1e2130; color: #e1e4ea;
    border: 1px solid #3d4260; border-radius: 6px; padding: 10px 14px;
    font-size: 11px; pointer-events: none; opacity: 0;
    transition: opacity 0.1s; z-index: 200; max-width: 260px; line-height: 1.5;
  }
  .tip.show { opacity: 1; }
  .tip b { color: #fff; font-size: 12px; display: block; margin-bottom: 3px; }

  .hoverable { cursor: pointer; }
  .hoverable:hover { filter: brightness(1.15); }
</style>

<div class="tip" id="tip"></div>

<script>
const tip = document.getElementById('tip');
document.querySelectorAll('.hoverable').forEach(el => {
  el.addEventListener('mouseenter', e => {
    const d = el.dataset.tip;
    if (!d) return;
    const p = d.split('|');
    tip.innerHTML = '<b>' + p[0] + '</b>' + p.slice(1).map(s => '<div>' + s + '</div>').join('');
    tip.classList.add('show');
  });
  el.addEventListener('mousemove', e => {
    tip.style.left = (e.clientX + 14) + 'px';
    tip.style.top = (e.clientY - 8) + 'px';
  });
  el.addEventListener('mouseleave', () => tip.classList.remove('show'));
});

const svg = document.getElementById('svg');
let sc = 1;
function z(f) { sc *= f; svg.style.transform = 'scale(' + sc + ')'; svg.style.transformOrigin = 'top center'; }
</script>
